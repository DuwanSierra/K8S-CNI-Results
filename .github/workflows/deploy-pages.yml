name: Deploy K8s Dashboard to Core Pages

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo base
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ejecutar extractor matematico
        run: node docs/procesador.js

      - name: Construir motor recomendador CNI
        working-directory: ./cni-recommender-spa
        run: |
          npm ci
          npm run sync:data
          npm run build:pages

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir documentos generados
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar hacia GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
